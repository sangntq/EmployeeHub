services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-employeehub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-employeehub}
      POSTGRES_DB: ${DB_NAME:-employeehub_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-employeehub} -d ${DB_NAME:-employeehub_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-employeehub}:${DB_PASSWORD:-employeehub}@db:5432/${DB_NAME:-employeehub_db}
      DATABASE_URL_SYNC: postgresql://${DB_USER:-employeehub}:${DB_PASSWORD:-employeehub}@db:5432/${DB_NAME:-employeehub_db}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
